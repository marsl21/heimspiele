<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heimspiele FC Rheineck</title>
  <style>
    :root{
      --blau:#003366;
      --rot:#cc0000;
      --bg:#f4f6f8;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --ring: rgba(0,51,102,.15);

      /* Team-Tints (sehr hell) */
     --tint-fcr1: rgba(59,130,246,.18);   /* neu: dunkleres Hellblau */
     --tint-fcr2: rgba(37,99,235,.28);    /* neu: nochmals dunkleres Blau */
     --tint-damen: rgba(239,68,68,.18);   /* neu: leicht stärkeres Rot */
     --tint-50p: rgba(107,114,128,.22);   /* neu: etwas dunkleres Grau */
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 16px;
    }

    header{
      position: sticky; top:0; z-index: 10;
      background: linear-gradient(135deg, #00264d, #004080);
      color: #fff;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,.15);
      text-align:center;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: .3px;
    }

    .day{ margin: 18px 0; }
    .day-title{
      background: var(--blau);
      color: #fff;
      padding: 9px 12px;
      border-radius: 12px;
      font-weight: 700;
      box-shadow: 0 6px 16px var(--ring);
    }

    .grid{
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 10px;
    }
    @media (min-width: 480px){
      .grid{ grid-template-columns: 1fr 1fr; }
    }

    .card{
      position: relative;
      background: var(--card);
      border-radius: 18px;
      padding: 16px 70px 16px 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
      border-left: 6px solid var(--rot);
      border-right: 6px solid var(--rot);
      transition: transform .15s ease, box-shadow .15s ease;
      overflow: hidden;
    }
    .card:hover{
      transform: translateY(-3px);
      box-shadow: 0 14px 30px rgba(0,0,0,.15);
    }
    .card:active{ transform: translateY(-1px) scale(.995); }

    /* Subtiles Fussball-Icon */
    .card::after{
      content:"⚽";
      position:absolute;
      bottom:10px;
      right:15px;
      font-size:40px;
      opacity:.12;
      pointer-events:none;
    }

    /* Team-Hintergründe (leicht/hell) */
    .card.team-fcr1{ background: linear-gradient(0deg, var(--tint-fcr1), var(--tint-fcr1)), var(--card); }
    .card.team-fcr2{ background: linear-gradient(0deg, var(--tint-fcr2), var(--tint-fcr2)), var(--card); }
    .card.team-damen{ background: linear-gradient(0deg, var(--tint-damen), var(--tint-damen)), var(--card); }
    .card.team-50p{ background: linear-gradient(0deg, var(--tint-50p), var(--tint-50p)), var(--card); }

    .top{ margin: 0 0 4px 0; padding: 0; }

    .time{
      font-weight: 900;
      font-size: 16px;
      color: var(--blau);
      white-space:nowrap;
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .right{
      position: absolute;
      top: 12px; right: 12px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
    }

    .badge{
      font-size: 12px;
      font-weight: 800;
      padding: 5px 9px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #111827;
      white-space:nowrap;
      margin: 0;
      box-shadow: 0 6px 14px rgba(0,0,0,.06);
    }
    .badge.cup{ background: #fee2e2; color:#991b1b; }
    .badge.meister{ background: #e0e7ff; color:#1e3a8a; }

    .info-btn{
      appearance: none;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      line-height: 1;
      transform: translateY(1px);
    }
    .info-btn:hover{ transform: translateY(0px) scale(1.03); }
    .info-icon{ width: 22px; height: 22px; display:block; }

    .teams{
      line-height: 1.4;
      font-size: 15px;
      margin-top: 8px;
    }
    .vs{
      display:block;
      color: var(--muted);
      font-size: 12px;
      margin: 4px 0;
    }

    .footer{
      margin-top: 18px;
      text-align:center;
      color: var(--muted);
      font-size: 12px;
    }
    .error{
      background: #fff1f1;
      color:#7f1d1d;
      border:1px solid #fecaca;
      padding: 10px 12px;
      border-radius: 12px;
      margin-top: 12px;
    }
    .loading{ opacity:.85 }

    /* Modal */
    .modal-backdrop{
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      display: none;
      align-items: center; justify-content: center;
      padding: 16px;
      z-index: 50;
    }
    .modal{
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      border-top: 6px solid var(--rot);
    }
    .modal-header{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom: 8px; }
    .modal-title{ font-weight: 900; }
    .modal-close{ appearance: none; border: none; background: transparent; font-size: 22px; line-height: 1; cursor: pointer; color: var(--muted); }
    .modal-body{ white-space: pre-wrap; line-height: 1.45; }
    .show{ display: flex; }
  </style>
</head>
<body>
  <header>📅 Heimspiele FC Rheineck</header>
  <div id="spielplan" class="loading">Wird geladen…</div>
  <div class="footer">Datenquelle: <code>spiele.csv</code> (Spalte <code>Informationen</code> optional).</div>

  <!-- Modal -->
  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <div id="modalTitle" class="modal-title">Information</div>
        <button class="modal-close" aria-label="Schliessen" id="modalClose">&times;</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    const WTAG = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
    const CSV_URL = "spiele.csv?v=" + Date.now();

    function parseCsv(text){
      text = text.replace(/^\uFEFF/, "");
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];

      const header = lines[0].split(";").map(s => s.trim());
      const col = k => header.indexOf(k);

      const idx = {
        datum: col("Spieldatum"),
        zeit: col("Zeit"),
        typ: col("Typ"),
        heim: col("Heimteam"),
        gast: col("Gastteam"),
        info: (col("Informationen") !== -1 ? col("Informationen") : col("Info"))
      };

      for (const k of ["datum","zeit","typ","heim","gast"]){
        if (idx[k] < 0) throw new Error("Spalte fehlt: " + k);
      }

      return lines.slice(1)
        .map(l => l.split(";"))
        .filter(arr => arr.some(v => v && v.trim() !== ""))
        .map(a => ({
          datum: (a[idx.datum]||"").trim(),
          zeit: (a[idx.zeit]||"").trim(),
          typ: (a[idx.typ]||"").trim(),
          heim: (a[idx.heim]||"").trim(),
          gast: (a[idx.gast]||"").trim(),
          info: idx.info >= 0 ? (a[idx.info]||"").trim() : ""
        }));
    }

    function toDateTime(datum, zeit){
      // datum: dd.mm.yyyy, zeit: hh:mm
      const [dd,mm,yy] = (datum||"").split(".").map(Number);
      const [hh,mi] = (zeit||"00:00").split(":").map(Number);
      if (!dd || !mm || !yy) return null;
      return new Date(yy, mm-1, dd, hh||0, mi||0);
    }

    function isFutureOrNow(row){
      const dt = toDateTime(row.datum, row.zeit);
      if (!dt) return false;         // wenn Datum kaputt ist, lieber nicht anzeigen
      return dt.getTime() >= Date.now();
    }

    function sortByDateTime(rows){
      return rows.slice().sort((a,b)=>{
        const A = toDateTime(a.datum, a.zeit)?.getTime() ?? 0;
        const B = toDateTime(b.datum, b.zeit)?.getTime() ?? 0;
        return A - B;
      });
    }

    function groupByDate(rows){
      const map = {};
      for (const r of rows){
        if (!map[r.datum]) map[r.datum] = [];
        map[r.datum].push(r);
      }
      return map;
    }

    function badgeClass(typ){
      const t = (typ||"").toLowerCase();
      if (t.includes("cup")) return "badge cup";
      if (t.includes("meister")) return "badge meister";
      return "badge";
    }

    function cardTeamClass(heimteam){
      // exakt nach deinen Vorgaben (Spalte E = Heimteam)
      const t = (heimteam || "").trim();
      if (t === "FC Rheineck 1") return "team-fcr1";
      if (t === "FC Rheineck 2") return "team-fcr2";
      if (t === "FC Au-Rheineck Damen") return "team-damen";
      if (t === "FC Rheineck-Au 50+") return "team-50p";
      return "";
    }

    function svgInfo(){
      return `<svg class="info-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="11" fill="none" stroke="var(--rot)" stroke-width="2"/>
        <line x1="12" y1="10" x2="12" y2="17" stroke="var(--rot)" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="7" r="1.6" fill="var(--rot)"/>
      </svg>`;
    }

    function render(rows){
      // 1) Vergangene Spiele rausfiltern
      const upcoming = rows.filter(isFutureOrNow);

      if (!upcoming.length){
        return '<div class="error">Keine kommenden Spiele gefunden.</div>';
      }

      const sorted = sortByDateTime(upcoming);
      const byDate = groupByDate(sorted);

      const dates = Object.keys(byDate).sort((a,b)=>{
        const A = toDateTime(a, "00:00")?.getTime() ?? 0;
        const B = toDateTime(b, "00:00")?.getTime() ?? 0;
        return A - B;
      });

      let html = "";
      for (const d of dates){
        const [dd,mm,yy] = d.split(".").map(Number);
        const w = WTAG[new Date(yy,mm-1,dd).getDay()];

        html += `<section class="day">
          <div class="day-title">${w}, ${d}</div>
          <div class="grid">`;

        for (const s of byDate[d]){
          const hasInfo = s.info && s.info.length > 0;
          const teamCls = cardTeamClass(s.heim);

          html += `<article class="card ${teamCls}" aria-label="Spiel ${s.heim} gegen ${s.gast} am ${d} um ${s.zeit}">
            <div class="top">
              <div class="time">🕒 ${s.zeit} Uhr</div>
            </div>

            <div class="right">
              <span class="${badgeClass(s.typ)}">${s.typ || "Spiel"}</span>
              ${hasInfo ? `<button class="info-btn" title="Info anzeigen" data-info="${s.info.replace(/"/g,'&quot;')}">${svgInfo()}</button>` : ``}
            </div>

            <div class="teams">
              <div><strong>${s.heim}</strong></div>
              <span class="vs">gegen</span>
              <div><strong>${s.gast}</strong></div>
            </div>
          </article>`;
        }

        html += `</div></section>`;
      }
      return html;
    }

    function attachModalHandlers(){
      const backdrop = document.getElementById("modalBackdrop");
      const body = document.getElementById("modalBody");
      const btnClose = document.getElementById("modalClose");

      document.body.addEventListener("click", (e) => {
        const btn = e.target.closest(".info-btn");
        if (btn){
          const txt = btn.getAttribute("data-info") || "";
          body.textContent = txt;
          backdrop.classList.add("show");
        }
      });

      btnClose.addEventListener("click", () => backdrop.classList.remove("show"));
      backdrop.addEventListener("click", (e) => {
        if (e.target === backdrop) backdrop.classList.remove("show");
      });
      document.addEventListener("keydown", (e)=>{
        if (e.key === "Escape") backdrop.classList.remove("show");
      });
    }

    fetch(CSV_URL, {cache:"no-store"})
      .then(r => { if(!r.ok) throw new Error("CSV nicht gefunden ("+r.status+")"); return r.text(); })
      .then(txt => {
        const rows = parseCsv(txt);
        document.getElementById("spielplan").classList.remove("loading");
        document.getElementById("spielplan").innerHTML = render(rows);
        attachModalHandlers();
      })
      .catch(err => {
        document.getElementById("spielplan").classList.remove("loading");
        document.getElementById("spielplan").innerHTML = '<div class="error">Fehler beim Laden: '+err.message+'</div>';
      });
  </script>
</body>
</html>
