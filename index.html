<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heimspiele FC Rheineck</title>
  <style>
    :root{
      --blau:#003366;
      --blau-2:#0b4d8a;
      --rot:#cc0000;
      --rot-2:#e11d48;

      --bg:
        radial-gradient(circle at top left, rgba(0,51,102,.10), transparent 28%),
        radial-gradient(circle at top right, rgba(204,0,0,.08), transparent 24%),
        linear-gradient(180deg, #eef3f8 0%, #f7f9fc 100%);

      --card: rgba(255,255,255,.92);
      --card-solid:#ffffff;
      --text:#17212f;
      --muted:#667085;
      --line:#d9e2ec;
      --ring: rgba(0,51,102,.12);
      --shadow: 0 10px 30px rgba(15,23,42,.08);
      --shadow-hover: 0 18px 40px rgba(15,23,42,.14);

      /* Team-Tints */
      --tint-fcr1: rgba(59,130,246,.15);
      --tint-fcr2: rgba(37,99,235,.24);
      --tint-damen: rgba(239,68,68,.14);
      --tint-50p: rgba(107,114,128,.18);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height:100vh;
      padding: 18px;
    }

    .app{
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    header{
      position: sticky;
      top: 0;
      z-index: 20;
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .hero{
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 20px 18px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(0,38,77,.96), rgba(0,64,128,.92)),
        linear-gradient(135deg, #00264d, #004080);
      box-shadow: 0 16px 35px rgba(0,0,0,.16);
      border: 1px solid rgba(255,255,255,.10);
      text-align: center;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:auto -60px -60px auto;
      width:180px;
      height:180px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(255,255,255,.12), transparent 70%);
      pointer-events:none;
    }

    .hero::after{
      content:"⚽";
      position:absolute;
      right:16px;
      bottom:10px;
      font-size:56px;
      opacity:.10;
      pointer-events:none;
    }

    .hero-title{
      margin:0;
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 900;
      letter-spacing: .2px;
    }

    .hero-sub{
      margin-top: 6px;
      font-size: 13px;
      color: rgba(255,255,255,.82);
      font-weight: 500;
    }

    #spielplan.loading{
      opacity:.85;
    }

    .day{
      margin: 22px 0;
    }

    .day-title{
      display:flex;
      align-items:center;
      gap:10px;
      width: fit-content;
      max-width: 100%;
      padding: 10px 14px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--blau), var(--blau-2));
      color: #fff;
      font-weight: 800;
      box-shadow: 0 8px 20px var(--ring);
      border: 1px solid rgba(255,255,255,.12);
    }

    .day-title::before{
      content:"📅";
      font-size: 16px;
      line-height: 1;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 12px;
    }

    @media (min-width: 620px){
      .grid{
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .card{
      position: relative;
      overflow: hidden;
      background: var(--card);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 22px;
      padding: 16px 16px 16px 16px;
      box-shadow: var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      isolation: isolate;
    }

    .card:hover{
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(0,51,102,.14);
    }

    .card:active{
      transform: translateY(-1px) scale(.996);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0 0 auto 0;
      height: 5px;
      background: linear-gradient(90deg, var(--rot), var(--blau));
      z-index: 1;
    }

    .card::after{
      content:"⚽";
      position:absolute;
      right:14px;
      bottom:8px;
      font-size:50px;
      opacity:.06;
      pointer-events:none;
      z-index:0;
    }

    .card.team-fcr1{
      background:
        linear-gradient(0deg, var(--tint-fcr1), var(--tint-fcr1)),
        var(--card-solid);
    }
    .card.team-fcr2{
      background:
        linear-gradient(0deg, var(--tint-fcr2), var(--tint-fcr2)),
        var(--card-solid);
    }
    .card.team-damen{
      background:
        linear-gradient(0deg, var(--tint-damen), var(--tint-damen)),
        var(--card-solid);
    }
    .card.team-50p{
      background:
        linear-gradient(0deg, var(--tint-50p), var(--tint-50p)),
        var(--card-solid);
    }

    .card-head{
      position:relative;
      z-index:2;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .time-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .time-icon{
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(135deg, rgba(0,51,102,.10), rgba(0,51,102,.18));
      color: var(--blau);
      font-size: 16px;
      flex: 0 0 auto;
    }

    .time-box{
      min-width:0;
    }

    .time-label{
      display:block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .3px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .time{
      font-weight: 900;
      font-size: 18px;
      color: var(--blau);
      line-height: 1.1;
      white-space: nowrap;
    }

    .actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
      margin-top:2px;
    }

    .badge{
      font-size: 12px;
      font-weight: 800;
      padding: 7px 10px;
      border-radius: 999px;
      background: #eef2f6;
      color: #1f2937;
      white-space: nowrap;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.04);
    }

    .badge.cup{
      background: #fee2e2;
      color:#991b1b;
    }

    .badge.meister{
      background: #dbeafe;
      color:#1e3a8a;
    }

    .info-btn{
      appearance:none;
      border:none;
      width:36px;
      height:36px;
      border-radius: 12px;
      background: rgba(255,255,255,.85);
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
      padding:0;
    }

    .info-btn:hover{
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,0,0,.12);
      background:#fff;
    }

    .info-icon{
      width: 20px;
      height: 20px;
      display:block;
    }

    .teams{
      position:relative;
      z-index:2;
      line-height:1.45;
    }

    .team-home,
    .team-away{
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .1px;
    }

    .team-home{
      color: var(--text);
    }

    .team-away{
      color: var(--text);
    }

    .vs{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin: 7px 0;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .vs::before,
    .vs::after{
      content:"";
      width: 20px;
      height: 1px;
      background: rgba(102,112,133,.35);
      display:inline-block;
    }

    .footer{
      margin-top: 24px;
      text-align:center;
      color: var(--muted);
      font-size: 12px;
      padding: 10px 12px;
    }

    .footer code{
      background: rgba(255,255,255,.7);
      padding: 2px 6px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,.05);
    }

    .error{
      background: #fff1f1;
      color:#7f1d1d;
      border:1px solid #fecaca;
      padding: 12px 14px;
      border-radius: 14px;
      margin-top: 12px;
      box-shadow: 0 8px 20px rgba(127,29,29,.06);
    }

    /* Modal */
    .modal-backdrop{
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,.48);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 60;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .modal{
      background: rgba(255,255,255,.97);
      border-radius: 22px;
      padding: 18px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 24px 60px rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.7);
      position: relative;
      overflow:hidden;
    }

    .modal::before{
      content:"";
      position:absolute;
      inset:0 0 auto 0;
      height: 6px;
      background: linear-gradient(90deg, var(--rot), var(--blau));
    }

    .modal-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom: 10px;
      padding-top: 4px;
    }

    .modal-title{
      font-weight: 900;
      font-size: 18px;
    }

    .modal-close{
      appearance:none;
      border:none;
      background: #f3f4f6;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      font-size: 24px;
      line-height: 1;
      cursor:pointer;
      color: var(--muted);
    }

    .modal-body{
      white-space: pre-wrap;
      line-height: 1.55;
      color: var(--text);
    }

    .show{
      display:flex;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="hero">
        <h1 class="hero-title">Heimspiele FC Rheineck</h1>
        <div class="hero-sub">Alle kommenden Heimspiele auf einen Blick</div>
      </div>
    </header>

    <div id="spielplan" class="loading">Wird geladen…</div>
    <div class="footer">Datenquelle: <code>spiele.csv</code> (Spalte <code>Informationen</code> optional).</div>
  </div>

  <!-- Modal -->
  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <div id="modalTitle" class="modal-title">Information</div>
        <button class="modal-close" aria-label="Schliessen" id="modalClose">&times;</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    const WTAG = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
    const CSV_URL = "spiele.csv?v=" + Date.now();

    function parseCsv(text){
      text = text.replace(/^\uFEFF/, "");
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];

      const header = lines[0].split(";").map(s => s.trim());
      const col = k => header.indexOf(k);

      const idx = {
        datum: col("Spieldatum"),
        zeit: col("Zeit"),
        typ: col("Typ"),
        heim: col("Heimteam"),
        gast: col("Gastteam"),
        info: (col("Informationen") !== -1 ? col("Informationen") : col("Info"))
      };

      for (const k of ["datum","zeit","typ","heim","gast"]){
        if (idx[k] < 0) throw new Error("Spalte fehlt: " + k);
      }

      return lines.slice(1)
        .map(l => l.split(";"))
        .filter(arr => arr.some(v => v && v.trim() !== ""))
        .map(a => ({
          datum: (a[idx.datum]||"").trim(),
          zeit: (a[idx.zeit]||"").trim(),
          typ: (a[idx.typ]||"").trim(),
          heim: (a[idx.heim]||"").trim(),
          gast: (a[idx.gast]||"").trim(),
          info: idx.info >= 0 ? (a[idx.info]||"").trim() : ""
        }));
    }

    function toDateTime(datum, zeit){
      const [dd,mm,yy] = (datum||"").split(".").map(Number);
      const [hh,mi] = (zeit||"00:00").split(":").map(Number);
      if (!dd || !mm || !yy) return null;
      return new Date(yy, mm-1, dd, hh||0, mi||0);
    }

    function isFutureOrNow(row){
      const dt = toDateTime(row.datum, row.zeit);
      if (!dt) return false;
      return dt.getTime() >= Date.now();
    }

    function sortByDateTime(rows){
      return rows.slice().sort((a,b)=>{
        const A = toDateTime(a.datum, a.zeit)?.getTime() ?? 0;
        const B = toDateTime(b.datum, b.zeit)?.getTime() ?? 0;
        return A - B;
      });
    }

    function groupByDate(rows){
      const map = {};
      for (const r of rows){
        if (!map[r.datum]) map[r.datum] = [];
        map[r.datum].push(r);
      }
      return map;
    }

    function badgeClass(typ){
      const t = (typ||"").toLowerCase();
      if (t.includes("cup")) return "badge cup";
      if (t.includes("meister")) return "badge meister";
      return "badge";
    }

    function cardTeamClass(heimteam){
      const t = (heimteam || "").trim();
      if (t === "FC Rheineck 1") return "team-fcr1";
      if (t === "FC Rheineck 2") return "team-fcr2";
      if (t === "FC Au-Rheineck Damen") return "team-damen";
      if (t === "FC Rheineck-Au 50+") return "team-50p";
      return "";
    }

    function svgInfo(){
      return `<svg class="info-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="10" fill="none" stroke="var(--rot)" stroke-width="2"/>
        <line x1="12" y1="10" x2="12" y2="16.5" stroke="var(--rot)" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="7.2" r="1.5" fill="var(--rot)"/>
      </svg>`;
    }

    function render(rows){
      const upcoming = rows.filter(isFutureOrNow);

      if (!upcoming.length){
        return '<div class="error">Keine kommenden Spiele gefunden.</div>';
      }

      const sorted = sortByDateTime(upcoming);
      const byDate = groupByDate(sorted);

      const dates = Object.keys(byDate).sort((a,b)=>{
        const A = toDateTime(a, "00:00")?.getTime() ?? 0;
        const B = toDateTime(b, "00:00")?.getTime() ?? 0;
        return A - B;
      });

      let html = "";
      for (const d of dates){
        const [dd,mm,yy] = d.split(".").map(Number);
        const w = WTAG[new Date(yy,mm-1,dd).getDay()];

        html += `<section class="day">
          <div class="day-title">${w}, ${d}</div>
          <div class="grid">`;

        for (const s of byDate[d]){
          const hasInfo = s.info && s.info.length > 0;
          const teamCls = cardTeamClass(s.heim);

          html += `<article class="card ${teamCls}" aria-label="Spiel ${s.heim} gegen ${s.gast} am ${d} um ${s.zeit}">
            <div class="card-head">
              <div class="time-wrap">
                <div class="time-icon">🕒</div>
                <div class="time-box">
                  <span class="time-label">Anpfiff</span>
                  <div class="time">${s.zeit} Uhr</div>
                </div>
              </div>

              <div class="actions">
                <span class="${badgeClass(s.typ)}">${s.typ || "Spiel"}</span>
                ${hasInfo ? `<button class="info-btn" title="Info anzeigen" data-info="${s.info.replace(/"/g,'&quot;')}">${svgInfo()}</button>` : ``}
              </div>
            </div>

            <div class="teams">
              <div class="team-home">${s.heim}</div>
              <div class="vs">gegen</div>
              <div class="team-away">${s.gast}</div>
            </div>
          </article>`;
        }

        html += `</div></section>`;
      }

      return html;
    }

    function attachModalHandlers(){
      const backdrop = document.getElementById("modalBackdrop");
      const body = document.getElementById("modalBody");
      const btnClose = document.getElementById("modalClose");

      document.body.addEventListener("click", (e) => {
        const btn = e.target.closest(".info-btn");
        if (btn){
          const txt = btn.getAttribute("data-info") || "";
          body.textContent = txt;
          backdrop.classList.add("show");
        }
      });

      btnClose.addEventListener("click", () => backdrop.classList.remove("show"));
      backdrop.addEventListener("click", (e) => {
        if (e.target === backdrop) backdrop.classList.remove("show");
      });
      document.addEventListener("keydown", (e)=>{
        if (e.key === "Escape") backdrop.classList.remove("show");
      });
    }

    fetch(CSV_URL, {cache:"no-store"})
      .then(r => {
        if(!r.ok) throw new Error("CSV nicht gefunden ("+r.status+")");
        return r.text();
      })
      .then(txt => {
        const rows = parseCsv(txt);
        document.getElementById("spielplan").classList.remove("loading");
        document.getElementById("spielplan").innerHTML = render(rows);
        attachModalHandlers();
      })
      .catch(err => {
        document.getElementById("spielplan").classList.remove("loading");
        document.getElementById("spielplan").innerHTML = '<div class="error">Fehler beim Laden: ' + err.message + '</div>';
      });
  </script>
</body>
</html>
