<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heimspiele FC Rheineck</title>
  <style>
    :root{
      --blau:#0d3f8a;
      --blau-dunkel:#123a82;
      --rot:#cf1f3b;
      --rot-dunkel:#b31630;

      --bg:#eef2f6;
      --card:#ffffff;
      --text:#182230;
      --muted:#6b7788;
      --line:#d9e1ea;

      --hero-grad: linear-gradient(135deg, #1b458f 0%, #6d2f7a 45%, #d61d2f 100%);
      --soft-panel: rgba(255,255,255,.14);
      --soft-panel-2: rgba(255,255,255,.10);

      --shadow-soft: 0 10px 30px rgba(9, 30, 66, .10);
      --shadow-card: 0 6px 18px rgba(15, 23, 42, .06);
      --shadow-card-hover: 0 10px 24px rgba(15, 23, 42, .10);

      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;

      --tint-fcr1: rgba(59,130,246,.07);
      --tint-fcr2: rgba(37,99,235,.10);
      --tint-damen: rgba(239,68,68,.07);
      --tint-50p: rgba(107,114,128,.08);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, #0f3c85 0, #0f3c85 175px, var(--bg) 175px, var(--bg) 100%);
      min-height:100vh;
      padding: 8px 12px 24px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .app{
      width: min(980px, 100%);
      margin: 0 auto;
    }

    header{
  margin-bottom: 30px;
}

    .hero{
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 18px 18px 16px;
      color: #fff;
      background: var(--hero-grad);
      box-shadow: 0 16px 36px rgba(9, 30, 66, .20);
    }

    .hero::before{
      content:"";
      position:absolute;
      right:-34px;
      top:-40px;
      width:130px;
      height:130px;
      border-radius:50%;
      background: rgba(255,255,255,.10);
    }

    .hero::after{
      content:"";
      position:absolute;
      right:36px;
      top:20px;
      width:72px;
      height:72px;
      border-radius:50%;
      background: rgba(255,255,255,.05);
    }

    .hero-top{
      position: relative;
      z-index: 1;
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom: 14px;
    }

    .hero-logo{
      width: 54px;
      height: 54px;
      border-radius: 14px;
      object-fit: contain;
      background: rgba(255,255,255,.10);
      padding: 4px;
      backdrop-filter: blur(4px);
      flex: 0 0 auto;
    }

    .hero-text{
      min-width:0;
    }

    .hero-title{
      margin:0;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .hero-sub{
      margin-top: 4px;
      font-size: 13px;
      color: rgba(255,255,255,.88);
      font-weight: 500;
    }

    .hero-info{
      position: relative;
      z-index: 1;
      display:grid;
      gap:10px;
    }

    .hero-chip{
      min-height: 34px;
      display:flex;
      align-items:center;
      padding: 9px 14px;
      border-radius: 14px;
      background: var(--soft-panel);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(6px);
    }

    #spielplan.loading{
      opacity:.82;
    }

    .day{
      margin: 18px 0 22px;
    }

    .day-title{
      display:inline-flex;
      align-items:center;
      gap:8px;
      max-width: 100%;
      padding: 8px 13px;
      border-radius: 999px;
      background: #ffffff;
      color: var(--blau-dunkel);
      border: 1px solid rgba(13,63,138,.08);
      font-weight: 700;
      font-size: 13px;
      box-shadow: 0 4px 12px rgba(15,23,42,.04);
    }

    .day-title::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:50%;
      background: linear-gradient(135deg, var(--blau), var(--rot));
      flex: 0 0 auto;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    @media (min-width: 720px){
      .grid{
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .card{
      position: relative;
      overflow: hidden;
      background: var(--card);
      border: 1px solid rgba(15,23,42,.05);
      border-radius: 22px;
      padding: 15px 15px 14px;
      box-shadow: var(--shadow-card);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .card:hover{
      transform: translateY(-2px);
      box-shadow: var(--shadow-card-hover);
      border-color: rgba(15,23,42,.08);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--blau) 0%, var(--rot) 100%);
      opacity:.95;
    }

    .card.team-fcr1{
      background:
        linear-gradient(0deg, var(--tint-fcr1), var(--tint-fcr1)),
        #ffffff;
    }
    .card.team-fcr2{
      background:
        linear-gradient(0deg, var(--tint-fcr2), var(--tint-fcr2)),
        #ffffff;
    }
    .card.team-damen{
      background:
        linear-gradient(0deg, var(--tint-damen), var(--tint-damen)),
        #ffffff;
    }
    .card.team-50p{
      background:
        linear-gradient(0deg, var(--tint-50p), var(--tint-50p)),
        #ffffff;
    }

    .card-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .time-wrap{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .time-icon{
      width: 34px;
      height: 34px;
      border-radius: 11px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: #f2f6fa;
      color: var(--blau);
      font-size: 14px;
      flex: 0 0 auto;
    }

    .time-box{
      min-width:0;
    }

    .time-label{
      display:block;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .10em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .time{
      font-weight: 800;
      font-size: 17px;
      color: var(--blau-dunkel);
      line-height: 1.1;
      white-space: nowrap;
    }

    .actions{
      display:flex;
      align-items:center;
      gap:7px;
      flex-shrink:0;
      margin-top:1px;
    }

    .badge{
      font-size: 11px;
      font-weight: 700;
      padding: 7px 10px;
      border-radius: 999px;
      background: #eff3f7;
      color: #334155;
      white-space: nowrap;
      border: 1px solid rgba(15,23,42,.04);
    }

    .badge.cup{
      background: #fef0f0;
      color:#a11b2a;
    }

    .badge.meister{
      background: #edf4ff;
      color:#18458a;
    }

    .info-btn{
      appearance:none;
      border:none;
      width:34px;
      height:34px;
      border-radius: 11px;
      background: #ffffff;
      box-shadow: 0 3px 10px rgba(0,0,0,.05);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition: transform .15s ease, box-shadow .15s ease;
      padding:0;
      border: 1px solid rgba(15,23,42,.05);
    }

    .info-btn:hover{
      transform: translateY(-1px);
      box-shadow: 0 7px 14px rgba(0,0,0,.08);
    }

    .info-icon{
      width: 18px;
      height: 18px;
      display:block;
    }

    .teams{
      line-height:1.4;
    }

    .team-home,
    .team-away{
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.01em;
    }

    .vs{
      display:inline-flex;
      align-items:center;
      gap:7px;
      margin: 6px 0;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .vs::before,
    .vs::after{
      content:"";
      width: 18px;
      height: 1px;
      background: rgba(102,112,133,.28);
      display:inline-block;
    }

    .footer{
      margin-top: 22px;
      text-align:center;
      color: var(--muted);
      font-size: 11px;
      padding: 8px 10px;
    }

    .footer code{
      background: #ffffff;
      padding: 2px 6px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,.04);
    }

    .error{
      background: #fff4f4;
      color:#8f1d2c;
      border:1px solid #ffd7dc;
      padding: 13px 14px;
      border-radius: 16px;
      margin-top: 12px;
      box-shadow: 0 8px 20px rgba(127,29,29,.05);
      font-size: 14px;
    }

    .modal-backdrop{
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,.42);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 60;
      backdrop-filter: blur(2px);
    }

    .modal{
      background: #ffffff;
      border-radius: 22px;
      padding: 18px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 24px 60px rgba(0,0,0,.20);
      position: relative;
      overflow:hidden;
    }

    .modal::before{
      content:"";
      position:absolute;
      inset:0 0 auto 0;
      height: 5px;
      background: linear-gradient(90deg, var(--blau), var(--rot));
    }

    .modal-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom: 10px;
      padding-top: 4px;
    }

    .modal-title{
      font-weight: 800;
      font-size: 17px;
      letter-spacing: -.01em;
    }

    .modal-close{
      appearance:none;
      border:none;
      background: #f3f4f6;
      width: 34px;
      height: 34px;
      border-radius: 11px;
      font-size: 22px;
      line-height: 1;
      cursor:pointer;
      color: var(--muted);
    }

    .modal-body{
      white-space: pre-wrap;
      line-height: 1.55;
      color: var(--text);
      font-size: 14px;
    }

    .show{
      display:flex;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="hero">
        <div class="hero-top">
          <img src="logo-fcr.png" alt="FC Rheineck Logo" class="hero-logo">
          <div class="hero-text">
            <h1 class="hero-title">Heimspiele FC Rheineck</h1>
            <div class="hero-sub">Alle kommenden Heimspiele auf einen Blick</div>
          </div>
        </div>

        <div class="hero-info">
          <div class="hero-chip">Spielplan für Teams, Trainer und Zuschauer</div>
        </div>
      </div>
    </header>

    <div id="spielplan" class="loading">Wird geladen…</div>
    <div class="footer">Datenquelle: <code>spiele.csv</code> (Spalte <code>Informationen</code> optional).</div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <div id="modalTitle" class="modal-title">Information</div>
        <button class="modal-close" aria-label="Schliessen" id="modalClose">&times;</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script>
    const WTAG = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
    const CSV_URL = "spiele.csv?v=" + Date.now();

    function parseCsv(text){
      text = text.replace(/^\uFEFF/, "");
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];

      const header = lines[0].split(";").map(s => s.trim());
      const col = k => header.indexOf(k);

      const idx = {
        datum: col("Spieldatum"),
        zeit: col("Zeit"),
        typ: col("Typ"),
        heim: col("Heimteam"),
        gast: col("Gastteam"),
        info: (col("Informationen") !== -1 ? col("Informationen") : col("Info"))
      };

      for (const k of ["datum","zeit","typ","heim","gast"]){
        if (idx[k] < 0) throw new Error("Spalte fehlt: " + k);
      }

      return lines.slice(1)
        .map(l => l.split(";"))
        .filter(arr => arr.some(v => v && v.trim() !== ""))
        .map(a => ({
          datum: (a[idx.datum]||"").trim(),
          zeit: (a[idx.zeit]||"").trim(),
          typ: (a[idx.typ]||"").trim(),
          heim: (a[idx.heim]||"").trim(),
          gast: (a[idx.gast]||"").trim(),
          info: idx.info >= 0 ? (a[idx.info]||"").trim() : ""
        }));
    }

    function toDateTime(datum, zeit){
      const [dd,mm,yy] = (datum||"").split(".").map(Number);
      const [hh,mi] = (zeit||"00:00").split(":").map(Number);
      if (!dd || !mm || !yy) return null;
      return new Date(yy, mm-1, dd, hh||0, mi||0);
    }

    function isFutureOrNow(row){
      const dt = toDateTime(row.datum, row.zeit);
      if (!dt) return false;
      return dt.getTime() >= Date.now();
    }

    function sortByDateTime(rows){
      return rows.slice().sort((a,b)=>{
        const A = toDateTime(a.datum, a.zeit)?.getTime() ?? 0;
        const B = toDateTime(b.datum, b.zeit)?.getTime() ?? 0;
        return A - B;
      });
    }

    function groupByDate(rows){
      const map = {};
      for (const r of rows){
        if (!map[r.datum]) map[r.datum] = [];
        map[r.datum].push(r);
      }
      return map;
    }

    function badgeClass(typ){
      const t = (typ||"").toLowerCase();
      if (t.includes("cup")) return "badge cup";
      if (t.includes("meister")) return "badge meister";
      return "badge";
    }

    function cardTeamClass(heimteam){
      const t = (heimteam || "").trim();
      if (t === "FC Rheineck 1") return "team-fcr1";
      if (t === "FC Rheineck 2") return "team-fcr2";
      if (t === "FC Au-Rheineck Damen") return "team-damen";
      if (t === "FC Rheineck-Au 50+") return "team-50p";
      return "";
    }

    function svgInfo(){
      return `<svg class="info-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="10" fill="none" stroke="var(--rot)" stroke-width="2"/>
        <line x1="12" y1="10" x2="12" y2="16.5" stroke="var(--rot)" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="7.2" r="1.5" fill="var(--rot)"/>
      </svg>`;
    }

    function render(rows){
      const upcoming = rows.filter(isFutureOrNow);

      if (!upcoming.length){
        return '<div class="error">Keine kommenden Spiele gefunden.</div>';
      }

      const sorted = sortByDateTime(upcoming);
      const byDate = groupByDate(sorted);

      const dates = Object.keys(byDate).sort((a,b)=>{
        const A = toDateTime(a, "00:00")?.getTime() ?? 0;
        const B = toDateTime(b, "00:00")?.getTime() ?? 0;
        return A - B;
      });

      let html = "";
      for (const d of dates){
        const [dd,mm,yy] = d.split(".").map(Number);
        const w = WTAG[new Date(yy,mm-1,dd).getDay()];

        html += `<section class="day">
          <div class="day-title">${w}, ${d}</div>
          <div class="grid">`;

        for (const s of byDate[d]){
          const hasInfo = s.info && s.info.length > 0;
          const teamCls = cardTeamClass(s.heim);

          html += `<article class="card ${teamCls}" aria-label="Spiel ${s.heim} gegen ${s.gast} am ${d} um ${s.zeit}">
            <div class="card-head">
              <div class="time-wrap">
                <div class="time-icon">🕒</div>
                <div class="time-box">
                  <span class="time-label">Anpfiff</span>
                  <div class="time">${s.zeit} Uhr</div>
                </div>
              </div>

              <div class="actions">
                <span class="${badgeClass(s.typ)}">${s.typ || "Spiel"}</span>
                ${hasInfo ? `<button class="info-btn" title="Info anzeigen" data-info="${s.info.replace(/"/g,'&quot;')}">${svgInfo()}</button>` : ``}
              </div>
            </div>

            <div class="teams">
              <div class="team-home">${s.heim}</div>
              <div class="vs">gegen</div>
              <div class="team-away">${s.gast}</div>
            </div>
          </article>`;
        }

        html += `</div></section>`;
      }

      return html;
    }

    function attachModalHandlers(){
      const backdrop = document.getElementById("modalBackdrop");
      const body = document.getElementById("modalBody");
      const btnClose = document.getElementById("modalClose");

      document.body.addEventListener("click", (e) => {
        const btn = e.target.closest(".info-btn");
        if (btn){
          const txt = btn.getAttribute("data-info") || "";
          body.textContent = txt;
          backdrop.classList.add("show");
        }
      });

      btnClose.addEventListener("click", () => backdrop.classList.remove("show"));
      backdrop.addEventListener("click", (e) => {
        if (e.target === backdrop) backdrop.classList.remove("show");
      });
      document.addEventListener("keydown", (e)=>{
        if (e.key === "Escape") backdrop.classList.remove("show");
      });
    }

    fetch(CSV_URL, {cache:"no-store"})
      .then(r => {
        if(!r.ok) throw new Error("CSV nicht gefunden ("+r.status+")");
        return r.text();
      })
      .then(txt => {
        const rows = parseCsv(txt);
        document.getElementById("spielplan").classList.remove("loading");
        document.getElementById("spielplan").innerHTML = render(rows);
        attachModalHandlers();
      })
      .catch(err => {
        document.getElementById("spielplan").classList.remove("loading");
        document.getElementById("spielplan").innerHTML = '<div class="error">Fehler beim Laden: ' + err.message + '</div>';
      });
  </script>
</body>
</html>
